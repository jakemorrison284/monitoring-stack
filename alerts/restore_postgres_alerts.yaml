alerts:
  - name: RestoreFailure
    condition: count() > 2
    query: |
      source="restore_postgres.sh" AND message:"Database restoration failed" AND level:"error"
    timeframe: 5m
    severity: critical
    notify: ["pagerduty", "email", "slack", "sms", "opsgenie", "microsoft-teams"]
    escalation:
      - after: 10m
        notify: ["on-call-manager"]
      - after: 20m
        notify: ["senior-engineer", "team-lead"]
      - after: 30m
        notify: ["engineering-director"]
      - after: 45m
        notify: ["cto"]
    labels:
      team: db-restore
      service: postgres
      alert_type: failure
      owner: db-restore-team
      priority: P1
    annotations:
      summary: "Critical failure in PostgreSQL restore process"
      description: "The PostgreSQL restoration process failed, indicating a potential outage or data loss risk. Immediate investigation is required."
      runbook: "https://internal-runbook.yara.com/restore-postgres-failure"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "Escalate as per escalation policy above."
      review: "Review and tune alert queries and thresholds quarterly."

  - name: RestoreJobStartFailure
    condition: count() > 1
    query: |
      source="restore_postgres.sh" AND message:"Restore job start failed" AND level:"error"
    timeframe: 5m
    severity: critical
    notify: ["pagerduty", "email", "slack", "sms", "opsgenie"]
    escalation:
      - after: 5m
        notify: ["on-call-manager"]
      - after: 15m
        notify: ["senior-engineer"]
      - after: 30m
        notify: ["team-lead"]
      - after: 45m
        notify: ["engineering-director"]
    labels:
      team: db-restore
      service: postgres
      alert_type: failure
      owner: db-restore-team
      priority: P1
    annotations:
      summary: "Failure to start PostgreSQL restore job"
      description: "The PostgreSQL restore job failed to start, which may indicate an issue with the restore process or environment. Immediate attention required."
      runbook: "https://internal-runbook.yara.com/restore-job-start-failure"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "Escalate as per escalation policy above."

  - name: RestoreResourceUtilizationHighCPU
    condition: avg(cpu_usage) > 85
    query: |
      source="restore_postgres.sh" AND metric="cpu_usage"
    timeframe: 7m
    severity: warning
    notify: ["email", "slack", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: resource
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "High CPU usage during PostgreSQL restore"
      description: "CPU usage during the PostgreSQL restore process has exceeded 85% over the last 7 minutes, which may impact performance. Investigate resource contention."
      runbook: "https://internal-runbook.yara.com/restore-resource-utilization"
      contact: "On-call Rotation: Use on-call system to determine contact"

  - name: RestoreResourceUtilizationHighMemory
    condition: avg(memory_usage) > 85
    query: |
      source="restore_postgres.sh" AND metric="memory_usage"
    timeframe: 7m
    severity: warning
    notify: ["email", "slack", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: resource
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "High memory usage during PostgreSQL restore"
      description: "Memory usage during the PostgreSQL restore process has exceeded 85% over the last 7 minutes, which may impact performance. Investigate resource contention."
      runbook: "https://internal-runbook.yara.com/restore-resource-utilization"
      contact: "On-call Rotation: Use on-call system to determine contact"

  - name: RestoreDurationAnomaly
    condition: avg(duration) > (avg_over_time(duration[7d]) * 1.4)
    query: |
      source="restore_postgres.sh" AND message:"Restore job completed"
    timeframe: 10m
    severity: warning
    notify: ["email", "slack", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: anomaly
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "Anomalous increase in PostgreSQL restore duration"
      description: "The duration of the PostgreSQL restore job has increased by 40% or more compared to the 7-day average, indicating potential performance degradation. Investigate promptly."
      runbook: "https://internal-runbook.yara.com/restore-duration-anomaly"
      contact: "On-call Rotation: Use on-call system to determine contact"

  - name: BackupFileInvalid
    condition: count() > 3
    query: |
      source="restore_postgres.sh" AND (message:"Backup file invalid" OR message:"Backup file corrupted")
    timeframe: 10m
    severity: warning
    notify: ["email", "slack", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: warning
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "Invalid or corrupted backup file detected"
      description: "The backup file used for restoration is either invalid or corrupted. This may affect the restore process and data integrity."
      runbook: "https://internal-runbook.yara.com/backup-file-invalid"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 30 minutes, escalate to db-restore-team lead."

  - name: NotificationScriptFailure
    condition: count() > 2
    query: |
      source="restore_postgres.sh" AND message:"Error" AND message:"notification script"
    timeframe: 5m
    severity: warning
    notify: ["email", "slack", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: warning
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "Failure in notification script during restore process"
      description: "An error occurred in the notification script while running the restore process, potentially impacting alerting and communication."
      runbook: "https://internal-runbook.yara.com/notification-script-failure"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 30 minutes, escalate to db-restore-team lead."

  - name: DryRunExecuted
    condition: count() > 0
    query: |
      source="restore_postgres.sh" AND message:"Dry run executed successfully"
    timeframe: 1h
    severity: informational
    notify: ["email", "slack"]
    labels:
      team: db-restore
      service: postgres
      alert_type: info
      owner: db-restore-team
      priority: P4
    annotations:
      summary: "Dry run of PostgreSQL restore executed successfully"
      description: "A dry run of the PostgreSQL restore process was executed successfully, indicating readiness for actual restores."
      runbook: "https://internal-runbook.yara.com/dry-run-success"
      contact: "On-call Rotation: Use on-call system to determine contact"

  - name: DryRunMissing
    condition: count() == 0
    query: |
      source="restore_postgres.sh" AND message:"Dry run executed successfully"
    timeframe: 2h30m
    severity: warning
    notify: ["email", "slack", "sms", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: warning
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "Dry run of PostgreSQL restore not detected"
      description: "No dry run of the PostgreSQL restore process has been detected in the last 2.5 hours. This may indicate readiness issues."
      runbook: "https://internal-runbook.yara.com/dry-run-monitoring"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 30 minutes, escalate to db-restore-team lead."

  - name: RestoreDurationExceeded
    condition: avg(duration) > 1h
    query: |
      source="restore_postgres.sh" AND message:"Restore job completed"
    timeframe: 1h
    severity: warning
    notify: ["email", "slack", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: warning
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "PostgreSQL restore duration exceeded expected threshold"
      description: "The duration of the PostgreSQL restore job has exceeded 1 hour, indicating potential performance issues or blocking."
      runbook: "https://internal-runbook.yara.com/restore-duration-exceeded"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 30 minutes, escalate to db-restore-team lead."

  - name: RestoreSuccessRateDrop
    condition: avg(success) < 0.95
    query: |
      source="restore_postgres.sh" AND message:"Restore job status"
    timeframe: 1h30m
    severity: warning
    notify: ["email", "slack", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: warning
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "PostgreSQL restore success rate dropped below 95%"
      description: "The success rate of PostgreSQL restore jobs has dropped below 95% over the past 1.5 hours. Immediate investigation is recommended."
      runbook: "https://internal-runbook.yara.com/restore-success-rate-drop"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 30 minutes, escalate to db-restore-team lead."

  - name: RestoreAlertsGroup
    condition: RestoreFailure or BackupFileInvalid or NotificationScriptFailure or RestoreDurationExceeded or RestoreSuccessRateDrop or RestoreJobStartFailure or RestoreResourceUtilizationHighCPU or RestoreResourceUtilizationHighMemory or RestoreDurationAnomaly
    timeframe: 5m
    severity: none
    notify: ["email", "slack"]
    annotations:
      summary: "Grouped alert to reduce alert fatigue for PostgreSQL restore issues"
      description: "This alert groups multiple restore-related alerts to reduce duplicate notifications."
      contact: "On-call Rotation: Use on-call system to determine contact"

  - name: RestoreAlertsSuppression
    condition: RestoreFailure
    suppress: [BackupFileInvalid, NotificationScriptFailure, RestoreJobStartFailure]
    timeframe: 10m
    severity: none
    notify: []
    annotations:
      summary: "Suppression of related restore alerts when critical failure occurs"
      description: "Suppresses BackupFileInvalid, NotificationScriptFailure, and RestoreJobStartFailure alerts for 10 minutes when RestoreFailure is active to reduce noise."
      contact: "On-call Rotation: Use on-call system to determine contact"

  - name: RestoreDurationTrendAnomaly
    condition: avg(duration) > (avg_over_time(duration[14d]) * 1.5)
    query: |
      source="restore_postgres.sh" AND message:"Restore job completed"
    timeframe: 15m
    severity: warning
    notify: ["email", "slack", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: anomaly
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "Significant trend anomaly in PostgreSQL restore duration"
      description: "The duration of the PostgreSQL restore job has increased by 50% or more compared to the 14-day average, indicating a significant performance degradation trend. Investigate promptly."
      runbook: "https://internal-runbook.yara.com/restore-duration-trend-anomaly"
      contact: "On-call Rotation: Use on-call system to determine contact"

  - name: RestoreResourceUtilizationHighDisk
    condition: avg(disk_usage) > 90
    query: |
      source="restore_postgres.sh" AND metric="disk_usage"
    timeframe: 5m
    severity: warning
    notify: ["email", "slack", "opsgenie"]
    labels:
      team: db-restore
      service: postgres
      alert_type: resource
      owner: db-restore-team
      priority: P3
    annotations:
      summary: "High disk usage during PostgreSQL restore"
      description: "Disk usage during the PostgreSQL restore process has exceeded 90% over the last 5 minutes, which may impact performance. Investigate resource contention."
      runbook: "https://internal-runbook.yara.com/restore-resource-utilization"
      contact: "On-call Rotation: Use on-call system to determine contact"

  - name: RestoreFailureDependency
    condition: RestoreFailure
    suppress: [BackupFileInvalid, NotificationScriptFailure, RestoreJobStartFailure]
    timeframe: 10m
    severity: none
    notify: []
    annotations:
      summary: "Suppress related lower-severity alerts during critical restore failure"
      description: "When RestoreFailure is firing, suppress BackupFileInvalid, NotificationScriptFailure, and RestoreJobStartFailure alerts to reduce noise and alert fatigue."
      contact: "On-call Rotation: Use on-call system to determine contact"

# Reminder: Periodically review and tune alert queries, thresholds, and timeframes to minimize false positives and improve detection accuracy.
# Consider expanding notification channels and escalation paths for critical alerts.
# Added additional escalation step for prolonged critical alerts.
# Added alert dependencies/suppression rules to reduce alert noise.
# Added new anomaly detection alerts (trend and disk usage).
# Grouped related alerts for alert fatigue reduction.

# Quarterly alert tidy 2023-Q4: Suggested reviewing 'DryRunExecuted' informational alert and resource utilization alerts for potential removal or tuning.

# Added alert for storage capacity during restore
- name: RestoreStorageCapacityAlert
  condition: avg(storage_usage) > 85
  query: |
    source="restore_postgres.sh" AND metric="storage_usage"
  timeframe: 5m
  severity: warning
  notify: ["email", "slack", "opsgenie"]
  labels:
    team: db-restore
    service: postgres
    alert_type: resource
    owner: db-restore-team
    priority: P3
  annotations:
    summary: "High storage usage during PostgreSQL restore"
    description: "Storage usage during restore has exceeded 85%, potentially impacting performance."
    runbook: "https://internal-runbook.yara.com/restore-storage-capacity"
    contact: "On-call Rotation: Use on-call system to determine contact"

# Added alert for I/O bottleneck during restore
- name: RestoreIOBottleneckAlert
  condition: avg(io_wait) > 20
  query: |
    source="restore_postgres.sh" AND metric="io_wait"
  timeframe: 5m
  severity: warning
  notify: ["email", "slack", "opsgenie"]
  labels:
    team: db-restore
    service: postgres
    alert_type: resource
    owner: db-restore-team
    priority: P3
  annotations:
    summary: "High I/O wait time during PostgreSQL restore"
    description: "I/O wait time exceeds 20ms, indicating potential bottlenecks."
    runbook: "https://internal-runbook.yara.com/restore-io-bottleneck"
    contact: "On-call Rotation: Use on-call system to determine contact"
