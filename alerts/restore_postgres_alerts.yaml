# Alert Rules for restore_postgres.sh

alerts:
  - name: RestoreFailure
    condition: count() > 2
    query: |
      source="restore_postgres.sh" AND message:"Database restoration failed" AND level:"error"
    timeframe: 5m
    severity: critical
    notify: ["pagerduty", "email", "slack"]
    annotations:
      summary: "Critical failure in PostgreSQL restore process"
      description: "The PostgreSQL restoration process failed, indicating a potential outage or data loss risk. Immediate investigation is required."
      runbook: "https://corrected-runbook-url.com/restore-postgres-failure"

  - name: BackupFileInvalid
    condition: count() > 3
    query: |
      source="restore_postgres.sh" AND (message:"Backup file invalid" OR message:"Backup file corrupted")
    timeframe: 10m
    severity: warning
    notify: ["email", "slack"]
    annotations:
      summary: "Invalid or corrupted backup file detected"
      description: "The backup file used for restoration is either invalid or corrupted. This may affect the restore process and data integrity."
      runbook: "https://corrected-runbook-url.com/backup-file-invalid"

  - name: NotificationScriptFailure
    condition: count() > 2
    query: |
      source="restore_postgres.sh" AND message:"Error" AND message:"notification script"
    timeframe: 5m
    severity: warning
    notify: ["email", "slack"]
    annotations:
      summary: "Failure in notification script during restore process"
      description: "An error occurred in the notification script while running the restore process, potentially impacting alerting and communication."
      runbook: "https://corrected-runbook-url.com/notification-script-failure"

  - name: DryRunExecuted
    condition: count() > 0
    query: |
      source="restore_postgres.sh" AND message:"Dry run executed successfully"
    timeframe: 1h
    severity: informational
    notify: ["email", "slack"]
    annotations:
      summary: "Dry run of PostgreSQL restore executed successfully"
      description: "A dry run of the PostgreSQL restore process was executed successfully, indicating readiness for actual restores."
      runbook: "https://corrected-runbook-url.com/dry-run-success"

  - name: RestoreAlertsGroup
    condition: RestoreFailure or BackupFileInvalid or NotificationScriptFailure
    timeframe: 0m
    severity: info
    notify: ["email", "slack"]
    annotations:
      summary: "Grouped alert to reduce alert fatigue for PostgreSQL restore issues"
      description: "This alert groups multiple restore-related alerts to reduce duplicate notifications."

# Reminder: Periodically review and tune alert queries, thresholds, and timeframes to minimize false positives and improve detection accuracy.
# Consider expanding notification channels and escalation paths for critical alerts.
# Add alert correlation or suppression rules to reduce alert fatigue where appropriate.
