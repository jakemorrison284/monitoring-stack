alerts:
  - name: RestoreFailure
    condition: count() > 2
    query: |
      source="restore_postgres.sh" AND message:"Database restoration failed" AND level:"error"
    timeframe: 5m
    severity: critical
    notify: ["pagerduty", "email", "slack", "sms"]
    escalation:
      - after: 10m
        notify: ["on-call-manager"]
      - after: 20m
        notify: ["senior-engineer", "team-lead"]
    annotations:
      summary: "Critical failure in PostgreSQL restore process"
      description: "The PostgreSQL restoration process failed, indicating a potential outage or data loss risk. Immediate investigation is required."
      runbook: "https://internal-runbook.yara.com/restore-postgres-failure"
      review: "Review and tune alert queries and thresholds quarterly."

  - name: BackupFileInvalid
    condition: count() > 3
    query: |
      source="restore_postgres.sh" AND (message:"Backup file invalid" OR message:"Backup file corrupted")
    timeframe: 10m
    severity: warning
    notify: ["email", "slack"]
    annotations:
      summary: "Invalid or corrupted backup file detected"
      description: "The backup file used for restoration is either invalid or corrupted. This may affect the restore process and data integrity."
      runbook: "https://internal-runbook.yara.com/backup-file-invalid"

  - name: NotificationScriptFailure
    condition: count() > 2
    query: |
      source="restore_postgres.sh" AND message:"Error" AND message:"notification script"
    timeframe: 5m
    severity: warning
    notify: ["email", "slack"]
    annotations:
      summary: "Failure in notification script during restore process"
      description: "An error occurred in the notification script while running the restore process, potentially impacting alerting and communication."
      runbook: "https://internal-runbook.yara.com/notification-script-failure"

  - name: DryRunExecuted
    condition: count() > 0
    query: |
      source="restore_postgres.sh" AND message:"Dry run executed successfully"
    timeframe: 1h
    severity: informational
    notify: ["email", "slack"]
    annotations:
      summary: "Dry run of PostgreSQL restore executed successfully"
      description: "A dry run of the PostgreSQL restore process was executed successfully, indicating readiness for actual restores."
      runbook: "https://internal-runbook.yara.com/dry-run-success"

  - name: DryRunMissing
    condition: count() == 0
    query: |
      source="restore_postgres.sh" AND message:"Dry run executed successfully"
    timeframe: 2h
    severity: warning
    notify: ["email", "slack", "sms"]
    annotations:
      summary: "Dry run of PostgreSQL restore not detected"
      description: "No dry run of the PostgreSQL restore process has been detected in the last 2 hours. This may indicate readiness issues."
      runbook: "https://internal-runbook.yara.com/dry-run-monitoring"

  - name: RestoreDurationExceeded
    condition: avg(duration) > 1h
    query: |
      source="restore_postgres.sh" AND message:"Restore job completed"
    timeframe: 1h
    severity: warning
    notify: ["email", "slack"]
    annotations:
      summary: "PostgreSQL restore duration exceeded expected threshold"
      description: "The duration of the PostgreSQL restore job has exceeded 1 hour, indicating potential performance issues or blocking."
      runbook: "https://internal-runbook.yara.com/restore-duration-exceeded"

  - name: RestoreSuccessRateDrop
    condition: avg(success) < 0.95
    query: |
      source="restore_postgres.sh" AND message:"Restore job status"
    timeframe: 1h
    severity: warning
    notify: ["email", "slack"]
    annotations:
      summary: "PostgreSQL restore success rate dropped below 95%"
      description: "The success rate of PostgreSQL restore jobs has dropped below 95% over the past hour. Immediate investigation is recommended."
      runbook: "https://internal-runbook.yara.com/restore-success-rate-drop"

  - name: RestoreAlertsGroup
    condition: RestoreFailure or BackupFileInvalid or NotificationScriptFailure or RestoreDurationExceeded or RestoreSuccessRateDrop
    timeframe: 5m
    severity: info
    notify: ["email", "slack"]
    annotations:
      summary: "Grouped alert to reduce alert fatigue for PostgreSQL restore issues"
      description: "This alert groups multiple restore-related alerts to reduce duplicate notifications."

# Reminder: Periodically review and tune alert queries, thresholds, and timeframes to minimize false positives and improve detection accuracy.
# Consider expanding notification channels and escalation paths for critical alerts.
# Add alert correlation or suppression rules to reduce alert fatigue where appropriate.
# Added alerts for restore duration and restore success rate drop.
# Added additional escalation step for prolonged critical alerts.
# Updated grouped alert to include new alerts.
