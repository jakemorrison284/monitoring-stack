groups:
- name: payments-core
  rules:
  - alert: HighPaymentErrorRate
    expr: rate(payment_errors_total[5m]) / rate(payment_requests_total[5m]) > 0.0001
    for: 60s
    labels: { severity: high }
    annotations: { 
      summary: "High payment error rate detected", 
      description: "Payment error rate exceeds 0.01%. Please notify the payment processing team and investigate immediately. Check logs for detailed error messages and potential issues with payment gateways.", 
      runbook: "https://example.com/runbook/payment-errors", 
      contact: "On-call Engineer: Mark Johnson (markjohnson@example.com)", 
      escalation: "If not resolved in 30 minutes, escalate to the payment processing manager." 
    }