groups:
- name: payments-core
  rules:
  # Warning alert for elevated payment error rate
  - alert: WarningPaymentErrorRateAlert
    expr: rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.0005
    for: 10m
    labels:
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "Elevated payment error rate detected",
      description: "The payment error rate has exceeded 0.0005 for 10 minutes. Please investigate potential issues before escalation. This tuning is based on recent incident INC-2025-1109 and subsequent recommendations.",
      runbook: "https://corrected-runbook-url.com/payment-errors",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.0005."
    }

  # Critical alert for very high payment error rate
  - alert: CriticalPaymentErrorRateAlert
    expr: rate(payment_errors_total[5m]) / rate(payment_requests_total[5m]) > 0.001
    for: 2m
    labels:
      severity: critical
      team: payments
      service: payment-processing
    annotations: {
      summary: "Critical payment error rate detected",
      description: "The payment error rate has exceeded 0.001 for 2 minutes. Immediate investigation required. This adjustment follows recent incident INC-2025-1109 and expert tuning recommendations.",
      runbook: "https://corrected-runbook-url.com/payment-errors-critical",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 3 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.001."
    }

  # Critical alert for payment errors or duplicate payments
  - alert: CriticalPaymentsAlert
    expr: |
      rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.0003 or
      rate(duplicate_payments_total[15m]) > 3
    for: 10m
    labels: 
      severity: critical
      team: payments
      service: payment-processing
    annotations: {
      summary: "Critical payment issues detected",
      description: "High payment error rate or duplicate payment transactions detected. Immediate investigation required. This tuning is based on lessons from incident INC-2025-1109.",
      runbook: "https://corrected-runbook-url.com/payment-errors-critical",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 12 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate and duplicate payments return to normal thresholds."
    }

  # Warning alert for high payment latency
  - alert: PaymentLatencyAlert
    expr: avg_over_time(payment_latency_seconds[5m]) > 1.2  # Adjusted threshold to 1.2 seconds for earlier detection
    for: 2m
    labels: 
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "High payment latency detected",
      description: "The average payment latency exceeds 1.2 seconds. Please investigate potential bottlenecks in the payment processing pipeline. Tuning based on incident INC-2025-1109 review.",
      runbook: "https://corrected-runbook-url.com/payment-latency",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 3 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when average payment latency returns below 1.2 seconds."
    }

  # Grouping rule to suppress duplicate alerts and reduce alert fatigue
  # This groups all payment-related alerts by team and service labels
  - alert: PaymentsAlertsGroup
    expr: |
      WarningPaymentErrorRateAlert or CriticalPaymentErrorRateAlert or CriticalPaymentsAlert or PaymentLatencyAlert
    for: 0m  # Fire immediately when any alert fires
    labels:
      severity: info
      team: payments
      service: payment-processing
    annotations:
      summary: "Grouped alert for payment issues to reduce alert fatigue"
      description: "This alert groups payment-related alerts to suppress duplicate notifications and reduce alert noise for the on-call team."

# Note: The new grouping rule PaymentsAlertsGroup suppresses duplicate alerts
# by grouping them under one alert notification based on common labels.
# This helps avoid alert fatigue and allows more focused incident response.
# Regular reviews and tuning of grouping rules are recommended.