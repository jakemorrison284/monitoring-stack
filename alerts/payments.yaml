groups:
- name: payments-core
  rules:
  - alert: WarningPaymentErrorRateAlert
    expr: rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.00015  # Tuned threshold for better sensitivity
    for: 8m  # Reduced duration for quicker alerting
    labels:
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "Elevated payment error rate detected",
      description: "The payment error rate has exceeded 0.00015 for 8 minutes. Please investigate potential issues before escalation.",
      runbook: "https://updated-runbook-url.com/payment-errors",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 8 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.00015."
    }

  - alert: CriticalPaymentsAlert
    expr: |
      rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.0003 or
      rate(duplicate_payments_total[15m]) > 1  # Lowered threshold for duplicates for earlier detection
    for: 12m  # Reduced duration
    labels: 
      severity: critical
      team: payments
      service: payment-processing
    annotations: {
      summary: "Critical payment issues detected",
      description: "High payment error rate or duplicate payment transactions detected. Immediate investigation required.",
      runbook: "https://updated-runbook-url.com/payment-errors-critical",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 12 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate and duplicate payments return to normal thresholds."
    }

  - alert: PaymentLatencyAlert
    expr: avg_over_time(payment_latency_seconds[5m]) > 1.2  # Lowered threshold for earlier detection
    for: 4m  # Reduced duration
    labels: 
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "High payment latency detected",
      description: "The average payment latency exceeds 1.2 seconds. Please investigate potential bottlenecks in the payment processing pipeline.",
      runbook: "https://updated-runbook-url.com/payment-latency",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 4 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when average payment latency returns below 1.2 seconds."
    }

# Note: Thresholds should be validated regularly against historical data to ensure alert sensitivity and reduce false positives.
# On-call engineers should be familiar with runbooks and escalation procedures to ensure timely incident response.
