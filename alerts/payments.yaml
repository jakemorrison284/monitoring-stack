groups:
- name: payments-core
  rules:
  # Informational alert for very low-level payment error anomalies
  - alert: InfoLowPaymentErrorRateAlert
    expr: rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.0001
    for: 20m  # Increased duration to reduce noise from transient spikes
    labels:
      severity: info
      team: payments
      service: payment-processing
    annotations:
      summary: "Low-level payment error anomaly detected"
      description: "A low but persistent payment error rate above 0.0001 has been detected for 20 minutes. This is an early signal for potential issues. Validate threshold with historical data to minimize false positives."
      runbook: "https://internal-runbook.yara.com/payment-errors-info"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "No immediate escalation. Monitor and investigate if trend continues."
      recovery: "Alert resolved when payment error rate returns below 0.0001."

  # Warning alert for elevated payment error rate
  - alert: WarningPaymentErrorRateAlert
    expr: rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.0005
    for: 7m  # Slightly increased duration for stability
    labels:
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "Elevated payment error rate detected",
      description: "The payment error rate has exceeded 0.0005 for 7 minutes. Please investigate potential issues before escalation. Threshold based on incident INC-2025-1109. Validate with historical data.",
      runbook: "https://internal-runbook.yara.com/payment-errors",
      contact: "On-call Rotation: Use on-call system to determine contact",
      escalation: "If not resolved in 12 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.0005."
    }

  # Critical alert for very high payment error rate
  - alert: CriticalPaymentErrorRateAlert
    expr: rate(payment_errors_total[5m]) / rate(payment_requests_total[5m]) > 0.001
    for: 2m  # Increased duration to reduce noise
    labels:
      severity: critical
      team: payments
      service: payment-processing
    annotations: {
      summary: "Critical payment error rate detected",
      description: "The payment error rate has exceeded 0.001 for 2 minutes. Immediate investigation required. Threshold based on incident INC-2025-1109.",
      runbook: "https://internal-runbook.yara.com/payment-errors-critical",
      contact: "On-call Rotation: Use on-call system to determine contact",
      escalation: "If not resolved in 5 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.001."
    }

  # Critical alert for payment errors or duplicate payments
  - alert: CriticalPaymentsAlert
    expr: |
      rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.0003 or
      rate(duplicate_payments_total[15m]) > 3
    for: 12m  # Slightly increased duration
    labels: 
      severity: critical
      team: payments
      service: payment-processing
    annotations: {
      summary: "Critical payment issues detected",
      description: "High payment error rate or duplicate payment transactions detected. Immediate investigation required. Threshold based on incident INC-2025-1109.",
      runbook: "https://internal-runbook.yara.com/payment-errors-critical",
      contact: "On-call Rotation: Use on-call system to determine contact",
      escalation: "If not resolved in 15 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate and duplicate payments return to normal thresholds."
    }

  # Warning alert for high payment latency
  - alert: PaymentLatencyAlert
    expr: avg_over_time(payment_latency_seconds[5m]) > 1.2
    for: 2m  # Increased duration for stability
    labels: 
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "High payment latency detected",
      description: "The average payment latency exceeds 1.2 seconds. Investigate potential bottlenecks. Threshold based on incident INC-2025-1109.",
      runbook: "https://internal-runbook.yara.com/payment-latency",
      contact: "On-call Rotation: Use on-call system to determine contact",
      escalation: "If not resolved in 5 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when average payment latency returns below 1.2 seconds."
    }

  # Dynamic threshold alert (ensure system support and testing)
  - alert: DynamicPaymentErrorRateAlert
    expr: rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > (0.5 * avg_over_time(rate(payment_errors_total[1h]) / rate(payment_requests_total[1h])[1d]))
    for: 7m  # Increased duration
    labels:
      severity: warning
      team: payments
      service: payment-processing
    annotations:
      summary: "Payment error rate above dynamic threshold"
      description: "Payment error rate has exceeded 50% above the daily average baseline. Confirm system support and test this alert."
      runbook: "https://internal-runbook.yara.com/payment-errors-dynamic"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If persistent for 7 minutes, escalate to payment processing manager."
      recovery: "Alert resolved when payment error rate returns below dynamic threshold."

  # Enhanced grouping rule to suppress duplicate alerts and reduce alert fatigue
  - alert: PaymentsAlertsGroup
    expr: |
      WarningPaymentErrorRateAlert or CriticalPaymentErrorRateAlert or CriticalPaymentsAlert or PaymentLatencyAlert or InfoLowPaymentErrorRateAlert or DynamicPaymentErrorRateAlert
    for: 0m
    labels:
      severity: info
      team: payments
      service: payment-processing
    annotations:
      summary: "Grouped alert for payment issues to reduce alert fatigue"
      description: "This alert groups payment-related alerts to suppress duplicate notifications and reduce alert noise for the on-call team. Regular review and tuning recommended."

# Notes:
# - Validate thresholds with historical data to minimize false positives.
# - Confirm dynamic threshold alert support and test thoroughly.
# - Use on-call rotation system for contact information instead of static contacts.
# - Regularly review alert noise metrics and adjust grouping or thresholds as needed.
# - Keep runbooks and documentation up to date for effective incident response.
