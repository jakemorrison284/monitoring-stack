groups:
- name: payments-core
  rules:
  - alert: HighPaymentErrorRateWarning
    expr: |
      rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.0002
    for: 10m
    labels:
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "Warning: Elevated payment error rate detected",
      description: "The payment error rate has exceeded 0.02%. Please investigate potential issues before they become critical.",
      runbook: "https://example.com/runbook/payment-errors",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.02%."
    }

  - alert: CriticalPaymentsAlert
    expr: |
      rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.0005 or
      rate(duplicate_payments_total[15m]) > 3
    for: 15m
    labels: 
      severity: critical
      team: payments
      service: payment-processing
    annotations: {
      summary: "Critical payment issues detected",
      description: "High payment error rate or duplicate payment transactions detected. Immediate investigation required.",
      runbook: "https://example.com/runbook/payment-errors",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 15 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate and duplicate payments return to normal thresholds."
    }

  - alert: DuplicatePaymentsWarning
    expr: rate(duplicate_payments_total[15m]) > 1
    for: 10m
    labels:
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "Warning: Duplicate payment transactions detected",
      description: "There have been more than 1 duplicate payment transactions in the last 15 minutes. Please investigate potential issues with payment processing.",
      runbook: "https://example.com/runbook/payment-errors",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when duplicate payments return to normal thresholds."
    }

  - alert: PaymentLatencyAlert
    expr: avg_over_time(payment_latency_seconds[5m]) > 2
    for: 3m
    labels: 
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "High payment latency detected",
      description: "The average payment latency exceeds 2 seconds. Please investigate potential bottlenecks in the payment processing pipeline.",
      runbook: "https://example.com/runbook/payment-latency",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 3 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when average payment latency returns below 2 seconds."
    }

# Note: Thresholds should be validated regularly against historical data to ensure alert sensitivity and reduce false positives.
