groups:
- name: payments-core
  rules:
  # Informational alert for very low-level payment error anomalies - tuned to reduce noise
  # Removed alert InfoLowPaymentErrorRateAlert due to potential alert fatigue as noted in TODO

  # Warning alert for elevated payment error rate - threshold increased and duration increased to reduce noise
  - alert: WarningPaymentErrorRateAlert
    expr: rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.001
    for: 20m
    labels:
      severity: warning
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations: {
      summary: "Elevated payment error rate detected",
      description: "The payment error rate has exceeded 0.001 for 20 minutes. Please investigate potential issues before escalation.",
      runbook: "https://internal-runbook.yara.com/payment-errors",
      contact: "On-call Rotation: Use on-call system to determine contact",
      escalation: "If not resolved in 20 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.001."
    }

  # Consolidated critical alert for high payment error rate or duplicate payments - unchanged
  - alert: CriticalPaymentIssuesAlert
    expr: |
      rate(payment_errors_total[5m]) / rate(payment_requests_total[5m]) > 0.001 or
      rate(duplicate_payments_total[5m]) > 3
    for: 5m
    labels:
      severity: critical
      team: payments
      service: payment-processing
      alert_type: threshold
      owner: payments-team
      priority: P1
    annotations: {
      summary: "Critical payment issues detected",
      description: "High payment error rate (>0.001) or duplicate payment transactions (>3 in 5 minutes) detected. Immediate investigation required.",
      runbook: "https://internal-runbook.yara.com/payment-errors-critical",
      contact: "On-call Rotation: Use on-call system to determine contact",
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate and duplicate payments return to normal thresholds."
    }

  # Warning alert for high payment latency - duration increased to reduce noise
  - alert: PaymentLatencyAlert
    expr: avg_over_time(payment_latency_seconds[5m]) > 1.2
    for: 7m
    labels:
      severity: warning
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations: {
      summary: "High payment latency detected",
      description: "The average payment latency exceeds 1.2 seconds. Investigate potential bottlenecks.",
      runbook: "https://internal-runbook.yara.com/payment-latency",
      contact: "On-call Rotation: Use on-call system to determine contact",
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when average payment latency returns below 1.2 seconds."
    }

  # Dynamic threshold alert - tuned with adjusted multiplier, lookback period, and minimum traffic threshold
  - alert: DynamicPaymentErrorRateAlert
    expr: rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > (0.65 * avg_over_time(rate(payment_errors_total[1h]) / rate(payment_requests_total[1h])[2d])) and rate(payment_requests_total[1h]) > 150
    for: 8m
    labels:
      severity: warning
      team: payments
      service: payment-processing
      alert_type: dynamic
    annotations:
      summary: "Payment error rate above dynamic threshold"
      description: "Payment error rate has exceeded 65% above the 2-day average baseline for more than 8 minutes, with minimum traffic threshold. This alert helps detect significant deviations while reducing false positives. Please refer to the runbook for investigation steps."
      runbook: "https://internal-runbook.yara.com/payment-errors-dynamic"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If persistent for 8 minutes, escalate to the payment processing manager."
      recovery: "Alert resolved when payment error rate returns below dynamic threshold."

  # Enhanced grouping rule to suppress duplicate alerts and reduce alert fatigue
  - alert: PaymentsAlertsGroup
    expr: |
      (WarningPaymentErrorRateAlert or CriticalPaymentIssuesAlert or PaymentLatencyAlert or DynamicPaymentErrorRateAlert or PaymentSuccessRateAlert or PaymentRequestsAbsentAlert or PaymentErrorRateByMethodAlert or PaymentGatewayAvailabilityAlert) and on()
    for: 0m
    labels:
      severity: none
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations:
      summary: "Grouped alert for payment issues to reduce alert fatigue"
      description: "This alert groups payment-related alerts to suppress duplicate notifications and reduce alert noise for the on-call team. Regular review and tuning recommended."

  # New alert for payment success rate with increased duration
  - alert: PaymentSuccessRateAlert
    expr: (rate(payment_success_total[10m]) / rate(payment_requests_total[10m])) < 0.99
    for: 7m
    labels:
      severity: warning
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations:
      summary: "Payment success rate dropped below 99%"
      description: "The ratio of successful payment transactions to total payment requests has dropped below 99% for more than 7 minutes. Investigate potential issues affecting payment success."
      runbook: "https://internal-runbook.yara.com/payment-success-rate"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager."
      recovery: "Alert resolved when payment success rate returns above 99%."

  # New alert for payment gateway availability
  - alert: PaymentGatewayAvailabilityAlert
    expr: avg_over_time(payment_gateway_availability[10m]) < 0.995
    for: 10m
    labels:
      severity: critical
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations:
      summary: "Payment gateway availability below 99.5%"
      description: "The payment gateway availability metric has dropped below 99.5% for more than 10 minutes. Immediate investigation required."
      runbook: "https://internal-runbook.yara.com/payment-gateway-availability"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 15 minutes, escalate to the payment processing manager."
      recovery: "Alert resolved when payment gateway availability returns above 99.5%."

  # New alert for sustained absence of payment requests metric
  - alert: PaymentRequestsAbsentAlert
    expr: absent_over_time(payment_requests_total[10m])
    for: 10m
    labels:
      severity: critical
      team: payments
      service: payment-processing
      alert_type: sustained_absence
    annotations:
      summary: "Sustained absence of payment requests metric"
      description: "No payment requests metric has been received for more than 10 minutes. This may indicate a monitoring or service outage. Immediate investigation required."
      runbook: "https://internal-runbook.yara.com/payment-requests-absent"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 15 minutes, escalate to the payment processing manager."
      recovery: "Alert resolved when payment requests metric is received again."

  # New multi-dimensional alert for payment error rate by payment method
  - alert: PaymentErrorRateByMethodAlert
    expr: rate(payment_errors_total{payment_method!=""}[10m]) / rate(payment_requests_total{payment_method!=""}[10m]) > 0.001
    for: 5m
    labels:
      severity: warning
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations:
      summary: "Elevated payment error rate detected by payment method"
      description: "The payment error rate for one or more payment methods has exceeded 0.1% for more than 5 minutes. Investigate potential issues specific to payment methods."
      runbook: "https://internal-runbook.yara.com/payment-errors-by-method"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager."
      recovery: "Alert resolved when payment error rates return below threshold for all payment methods."

# Alert dependencies to reduce noise: lower severity alerts suppressed if higher severity alert firing
  - alert: WarningPaymentErrorRateAlert
    expr: rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.001 and ignoring(alertname) (absent(CriticalPaymentIssuesAlert) or CriticalPaymentIssuesAlert == 0)
    for: 20m
    labels:
      severity: warning
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations: {
      summary: "Elevated payment error rate detected",
      description: "The payment error rate has exceeded 0.001 for 20 minutes, but no critical payment issues alert is firing. Please investigate potential issues before escalation.",
      runbook: "https://internal-runbook.yara.com/payment-errors",
      contact: "On-call Rotation: Use on-call system to determine contact",
      escalation: "If not resolved in 20 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.001."
    }

# Additional labels for alert ownership and priority
  - alert: CriticalPaymentIssuesAlert
    expr: |
      rate(payment_errors_total[5m]) / rate(payment_requests_total[5m]) > 0.001 or
      rate(duplicate_payments_total[5m]) > 3
    for: 5m
    labels:
      severity: critical
      team: payments
      service: payment-processing
      alert_type: threshold
      owner: payments-team
      priority: P1
    annotations: {
      summary: "Critical payment issues detected",
      description: "High payment error rate (>0.001) or duplicate payment transactions (>3 in 5 minutes) detected. Immediate investigation required.",
      runbook: "https://internal-runbook.yara.com/payment-errors-critical",
      contact: "On-call Rotation: Use on-call system to determine contact",
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate and duplicate payments return to normal thresholds."
    }

  # Additional alert rules added based on suggestions

  # Alert for significant drop in payment request volume compared to baseline
  - alert: PaymentVolumeDropAlert
    expr: (rate(payment_requests_total[10m]) < 0.7 * avg_over_time(rate(payment_requests_total[10m])[1d]))
    for: 10m
    labels:
      severity: critical
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations:
      summary: "Significant drop in payment request volume detected"
      description: "The payment request volume has dropped below 70% of the daily average baseline for more than 10 minutes. Investigate potential upstream or service issues."
      runbook: "https://internal-runbook.yara.com/payment-volume-drop"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 15 minutes, escalate to the payment processing manager."
      recovery: "Alert resolved when payment request volume returns to normal baseline."

  # Alert for high latency on specific payment methods
  - alert: PaymentMethodLatencyAlert
    expr: avg_over_time(payment_latency_seconds[5m]) by (payment_method) > 1.5
    for: 5m
    labels:
      severity: warning
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations:
      summary: "High payment latency detected for payment method {{ $labels.payment_method }}"
      description: "The average payment latency for payment method {{ $labels.payment_method }} exceeds 1.5 seconds for more than 5 minutes. Investigate potential bottlenecks or issues with this method."
      runbook: "https://internal-runbook.yara.com/payment-method-latency"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager."
      recovery: "Alert resolved when payment latency for the payment method returns below threshold."

  # Alert for high payment retry rate
  - alert: PaymentRetryRateAlert
    expr: rate(payment_retries_total[10m]) / rate(payment_requests_total[10m]) > 0.01
    for: 10m
    labels:
      severity: warning
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations:
      summary: "High payment retry rate detected"
      description: "The payment retry rate has exceeded 1% of total payment requests for more than 10 minutes. Investigate causes of retries such as transient failures or gateway issues."
      runbook: "https://internal-runbook.yara.com/payment-retries"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 15 minutes, escalate to the payment processing manager."
      recovery: "Alert resolved when payment retry rate returns below threshold."

  # Alert on spikes in specific payment gateway error codes
  - alert: PaymentGatewayErrorCodeSpikeAlert
    expr: rate(payment_gateway_error_codes_total{code=~"5.."}[5m]) > 5
    for: 5m
    labels:
      severity: critical
      team: payments
      service: payment-processing
      alert_type: threshold
    annotations:
      summary: "Spike in 5xx payment gateway error codes detected"
      description: "There is a spike in 5xx error codes from the payment gateway, indicating potential external service issues. Immediate investigation required."
      runbook: "https://internal-runbook.yara.com/payment-gateway-errors"
      contact: "On-call Rotation: Use on-call system to determine contact"
      escalation: "If not resolved in 10 minutes, escalate to the payment processing manager."
      recovery: "Alert resolved when error code rate returns to normal levels."
