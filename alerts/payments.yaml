groups:
- name: payments-core
  rules:
  - alert: WarningPaymentErrorRateAlert
    expr: rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.00038
    for: 6m
    labels:
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "Elevated payment error rate detected",
      description: "The payment error rate has exceeded 0.00038 for 6 minutes. Please investigate potential issues before escalation. This tuning optimizes sensitivity based on recent incident learnings.",
      runbook: "https://corrected-runbook-url.com/payment-errors",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 6 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.00038."
    }

  - alert: CriticalPaymentErrorRateAlert
    expr: rate(payment_errors_total[5m]) / rate(payment_requests_total[5m]) > 0.00085
    for: 3m
    labels:
      severity: critical
      team: payments
      service: payment-processing
    annotations: {
      summary: "Critical payment error rate detected",
      description: "The payment error rate has exceeded 0.00085 for 3 minutes. Immediate investigation required. Further tuning based on incident INC-2025-1109 and expert recommendations.",
      runbook: "https://corrected-runbook-url.com/payment-errors-critical",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 3 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate returns below 0.00085."
    }

  - alert: CriticalPaymentsAlert
    expr: |
      rate(payment_errors_total[10m]) / rate(payment_requests_total[10m]) > 0.00028 or
      rate(duplicate_payments_total[15m]) > 4
    for: 11m
    labels: 
      severity: critical
      team: payments
      service: payment-processing
    annotations: {
      summary: "Critical payment issues detected",
      description: "High payment error rate or duplicate payment transactions detected. Immediate investigation required. Tuned further based on recent incident insights.",
      runbook: "https://corrected-runbook-url.com/payment-errors-critical",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 11 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when payment error rate and duplicate payments return to normal thresholds."
    }

  - alert: PaymentLatencyAlert
    expr: avg_over_time(payment_latency_seconds[5m]) > 1.25  # Adjusted threshold to 1.25 seconds for earlier detection
    for: 3m
    labels: 
      severity: warning
      team: payments
      service: payment-processing
    annotations: {
      summary: "High payment latency detected",
      description: "The average payment latency exceeds 1.25 seconds. Please investigate potential bottlenecks in the payment processing pipeline. Tuned based on incident INC-2025-1109 and recent learnings.",
      runbook: "https://corrected-runbook-url.com/payment-latency",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 3 minutes, escalate to the payment processing manager.",
      recovery: "Alert resolved when average payment latency returns below 1.25 seconds."
    }

# Note: Thresholds tuned based on incident INC-2025-1109 and recent expert recommendations.
# Regular reviews of thresholds and alert effectiveness are recommended to balance sensitivity and noise.
# On-call engineers should be familiar with runbooks and escalation procedures to ensure timely incident response.
