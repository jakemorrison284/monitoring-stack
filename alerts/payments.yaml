groups:
- name: payments-core
  rules:
  - alert: HighPaymentErrorRate
    expr: rate(payment_errors_total[5m]) / rate(payment_requests_total[5m]) > 0.001  # Adjusted threshold to 0.15%
    for: 5m
    labels: { severity: critical }
    annotations: { 
      summary: "High payment error rate detected", 
      description: "Payment error rate exceeds 0.15%. Please notify the payment processing team and investigate immediately. Check logs for detailed error messages and potential issues with payment gateways.", 
      runbook: "https://example.com/runbook/payment-errors", 
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)", 
      escalation: "If not resolved in 5 minutes, escalate to the payment processing manager."
    }

  - alert: DuplicatePaymentAlert
    expr: rate(duplicate_payments_total[5m]) > 3  # Adjusted threshold to 3 duplicates
    for: 5m
    labels: { severity: critical }
    annotations: {
      summary: "Duplicate payment transactions detected",
      description: "More than 3 duplicate payment transactions detected within a 5-minute window. Please check for potential issues in the payment processing system.",
      runbook: "https://example.com/runbook/duplicate-payments",
      contact: "On-call Engineer: Rachel Torres (racheltorres@example.com)",
      escalation: "If not resolved in 3 minutes, escalate to the payment processing manager.",
      follow_up: "Investigate the root causes of duplicate transactions, linking to relevant logs or transaction IDs."
    }